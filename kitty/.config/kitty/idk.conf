# Noir Rosé Pine Grey — Kitty color settings (paste into ~/.config/kitty/kitty.conf)

# core
foreground  #e0def4
background  #090909
selection_foreground  #e0def4
selection_background  #6e6a86

# cursor (block/text)
cursor                #e0def4
cursor_text           #6e6a86

# ANSI palette (standard 0..7)
color0   #26233a   # black
color1   #eb6f92   # red
color2   #31748f   # green
color3   #f6c177   # yellow
color4   #9ccfd8   # blue
color5   #c4a7e7   # magenta
color6   #ebbcba   # cyan
color7   #e0def4   # white / light

# Bright palette (8..15)
color8   #908caa   # bright black (muted)
color9   #eb6f92   # bright red
color10  #31748f   # bright green
color11  #f6c177   # bright yellow
color12  #9ccfd8   # bright blue
color13  #c4a7e7   # bright magenta
color14  #ebbcba   # bright cyan
color15  #e0def4   # bright white

# optional UI polish
# tab / title / scrollbar accents
active_tab_background   #111111
active_tab_foreground   #e0def4
inactive_tab_foreground #908caa
tab_bar_background      #090909
scrollbar_thumb         #31748f80

# hints: make the cursor a stable block by ensuring shell_integration doesn't override it
# shell_integration no-cursor

